<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceiling Airspace HUD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --hud-color: #00ffcc;
            --hud-alert: #ff0055;
            --bg-color: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--hud-color);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient glowing grid */
        .grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.05) 1px, transparent 1px);
            background-size: 80px 80px;
            z-index: 0;
        }

        #radar {
            position: relative;
            width: 85vmin;
            height: 85vmin;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.1);
            z-index: 1;
        }

        #radar::before, #radar::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 204, 0.2);
        }
        #radar::before { top: 0; left: 50%; width: 1px; height: 100%; }
        #radar::after { top: 50%; left: 0; width: 100%; height: 1px; }

        .ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px dashed rgba(0, 255, 204, 0.2);
        }
        .ring-1 { width: 30%; height: 30%; }
        .ring-2 { width: 60%; height: 60%; }
        .ring-3 { width: 90%; height: 90%; }

        .sweep {
            position: absolute;
            top: 0; left: 50%;
            width: 50%; height: 50%;
            background: conic-gradient(from 0deg at 0 100%, rgba(0, 255, 204, 0.4) 0deg, transparent 90deg);
            transform-origin: 0 100%;
            animation: scan 5s linear infinite;
            z-index: 2;
        }

        @keyframes scan {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .plane {
            position: absolute;
            width: 30px;
            height: 30px;
            margin-top: -15px;
            margin-left: -15px;
            z-index: 5;
            transition: all 1s ease-out;
        }

        .plane svg {
            width: 100%;
            height: 100%;
            fill: var(--hud-alert);
            filter: drop-shadow(0 0 5px var(--hud-alert));
        }

        .plane-label {
            position: absolute;
            top: 25px; left: 25px;
            font-size: 12px;
            color: #fff;
            white-space: nowrap;
            background: rgba(0,0,0,0.5);
            padding: 2px 5px;
        }

        .hud-panel {
            position: absolute;
            background: rgba(0, 20, 20, 0.8);
            border: 1px solid var(--hud-color);
            padding: 15px;
            z-index: 10;
            min-width: 250px;
        }

        #top-left { top: 20px; left: 20px; border-left: 5px solid var(--hud-color); }
        #bottom-right { bottom: 20px; right: 20px; text-align: right; border-right: 5px solid var(--hud-color); }
        
        #manual-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: none;
            border: 1px solid var(--hud-alert);
            color: var(--hud-alert);
            padding: 10px;
            cursor: pointer;
            z-index: 100;
            font-family: 'Share Tech Mono';
        }

        h1 { font-size: 1rem; margin-bottom: 10px; opacity: 0.8; letter-spacing: 2px; }
        .data-row { margin-bottom: 5px; font-size: 0.85rem; }
        .value { color: #fff; text-shadow: 0 0 5px var(--hud-color); }

        #status-bar {
            position: absolute;
            top: 0; width: 100%;
            text-align: center;
            padding: 5px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            background: rgba(0, 255, 204, 0.1);
        }

        .center-mark {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background: var(--hud-color);
            transform: translate(-50%, -50%) rotate(45deg);
        }
    </style>
</head>
<body>

    <div id="status-bar">SYSTEM INITIALIZING...</div>
    <div class="grid"></div>
    
    <button id="manual-btn" onclick="startManual()">BYPASS GPS & START</button>

    <div class="hud-panel" id="top-left">
        <h1>LOCAL AIRSPACE</h1>
        <div class="data-row">LAT: <span class="value" id="user-lat">0.00</span></div>
        <div class="data-row">LON: <span class="value" id="user-lon">0.00</span></div>
        <div class="data-row">STATUS: <span class="value" id="sys-status">SEARCHING...</span></div>
    </div>

    <div class="hud-panel" id="bottom-right">
        <h1>TRACKING DATA</h1>
        <div class="data-row">CALLSIGN: <span class="value" id="p-callsign">--</span></div>
        <div class="data-row">ALTITUDE: <span class="value" id="p-alt">--</span> FT</div>
        <div class="data-row">SPEED: <span class="value" id="p-vel">--</span> KTS</div>
    </div>

    <div id="radar">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="sweep"></div>
        <div class="center-mark"></div>
        <div id="planes-container"></div>
    </div>

    <script>
        const API_REFRESH = 15000;
        let userLat = 40.7128; // Default NY
        let userLon = -74.0060;
        let isSimulating = false;

        const planeSVG = `<svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>`;

        function updateStatus(msg, color) {
            const el = document.getElementById('status-bar');
            el.innerText = msg.toUpperCase();
            if(color) el.style.color = color;
        }

        function startManual() {
            document.getElementById('manual-btn').style.display = 'none';
            updateStatus("Manual Override Engaged", "#ff0055");
            beginTracking();
        }

        async function init() {
            updateStatus("Requesting Satellite Link...");
            
            // Set a timeout: if Geolocation takes > 5 seconds, switch to Demo mode
            const geoTimeout = setTimeout(() => {
                if (!isSimulating && userLat === 40.7128) {
                    updateStatus("GPS Timeout - Simulation Mode", "#ff0055");
                    beginTracking();
                }
            }, 5000);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        clearTimeout(geoTimeout);
                        userLat = pos.coords.latitude;
                        userLon = pos.coords.longitude;
                        document.getElementById('user-lat').innerText = userLat.toFixed(4);
                        document.getElementById('user-lon').innerText = userLon.toFixed(4);
                        document.getElementById('manual-btn').style.display = 'none';
                        beginTracking();
                    },
                    (err) => {
                        console.log("Geo error", err);
                        updateStatus("Link Failed - Press Bypass", "#ff0055");
                    },
                    { timeout: 10000 }
                );
            }
        }

        function beginTracking() {
            fetchData();
            setInterval(fetchData, API_REFRESH);
        }

        async function fetchData() {
            const range = 0.8; // Roughly 80km
            const lamin = userLat - range;
            const lamax = userLat + range;
            const lomin = userLon - range;
            const lomax = userLon + range;

            document.getElementById('sys-status').innerText = "SCANNING...";

            try {
                const response = await fetch(`https://opensky-network.org/api/states/all?lamin=${lamin}&lomin=${lomin}&lamax=${lamax}&lomax=${lomax}`);
                const data = await response.json();
                
                if (data.states) {
                    renderPlanes(data.states);
                    document.getElementById('sys-status').innerText = "LIVE DATA";
                } else {
                    throw new Error("No planes");
                }
            } catch (e) {
                document.getElementById('sys-status').innerText = "SIMULATING";
                runSimulation();
            }
        }

        function renderPlanes(states) {
            const container = document.getElementById('planes-container');
            container.innerHTML = '';
            
            let closest = null;
            let minDist = 100;

            states.slice(0, 12).forEach(s => {
                const lat = s[6];
                const lon = s[5];
                if (!lat || !lon) return;

                const x = ((lon - userLon) / 0.8 + 1) * 50;
                const y = ((userLat - lat) / 0.8 + 1) * 50;
                const dist = Math.sqrt(Math.pow(x-50, 2) + Math.pow(y-50, 2));

                if(dist < minDist) {
                    minDist = dist;
                    closest = { call: s[1], alt: s[7], speed: s[9] };
                }

                const el = document.createElement('div');
                el.className = 'plane';
                el.style.left = x + '%';
                el.style.top = y + '%';
                el.style.transform = `rotate(${s[10]}deg)`;
                el.innerHTML = `${planeSVG}<div class="plane-label" style="transform:rotate(-${s[10]}deg)">${s[1].trim() || 'UNK'}</div>`;
                container.appendChild(el);
            });

            if(closest) {
                document.getElementById('p-callsign').innerText = closest.call;
                document.getElementById('p-alt').innerText = Math.round(closest.alt * 3.28); // to feet
                document.getElementById('p-vel').innerText = Math.round(closest.speed * 1.94); // to knots
            }
        }

        function runSimulation() {
            const mock = [];
            for(let i=0; i<6; i++) {
                mock.push([
                    "", "SIM"+i, "", "", "", 
                    userLon + (Math.random()-0.5), userLat + (Math.random()-0.5), 
                    5000 + Math.random()*5000, false, 250, Math.random()*360
                ]);
            }
            renderPlanes(mock);
        }

        window.onload = init;
    </script>
</body>
</html>
