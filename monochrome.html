<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Splash / Isolate Color Tool</title>
    <style>
        :root {
            --primary: #3498db;
            --bg: #f4f7f6;
            --text: #333;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 5px;
            text-align: center;
            font-size: 1.8rem;
        }

        p {
            margin-top: 0;
            color: #666;
            text-align: center;
            font-size: 0.9rem;
            padding: 0 10px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Apple/Mobile friendly touch targets */
        input[type="file"] {
            font-size: 16px;
            padding: 10px 0;
        }

        input[type="range"] {
            cursor: pointer;
            width: 100%;
            height: 40px; /* Taller touch area for thumb */
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px; /* Bigger tap target for mobile */
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
            width: 100%;
            -webkit-appearance: none; /* Removes iOS default styling */
        }

        button:hover:not(:disabled), button:active:not(:disabled) {
            background-color: #2980b9;
        }
        
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .canvas-container {
            width: 100%;
            max-width: 800px;
            border: 2px dashed #ccc;
            background: white;
            position: relative;
            /* Prevents the page from scrolling when you try to tap the image */
            touch-action: none; 
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            cursor: crosshair;
        }

        .color-preview-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
        }

        #colorPreview {
            width: 36px;
            height: 36px;
            border: 2px solid #ddd;
            border-radius: 50%;
            background-color: transparent;
        }
        
        #rgbValues {
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Color Isolator</h1>
    <p>Upload a photo, tap a color to isolate it, and adjust the variance slider.</p>

    <div class="controls">
        <div class="control-group">
            <label for="imageUpload"><strong>1. Upload Image</strong></label>
            <input type="file" id="imageUpload" accept="image/*">
        </div>

        <div class="control-group">
            <label for="tolerance"><strong>2. Adjust Variance: <span id="toleranceValue">60</span></strong></label>
            <input type="range" id="tolerance" min="0" max="255" value="60">
        </div>

        <div class="control-group">
            <label><strong>Selected Color</strong></label>
            <div class="color-preview-wrapper">
                <div id="colorPreview"></div>
                <span id="rgbValues">Tap the image!</span>
            </div>
        </div>

        <button id="downloadBtn" disabled>Save Image</button>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const toleranceSlider = document.getElementById('tolerance');
        const toleranceValue = document.getElementById('toleranceValue');
        const colorPreview = document.getElementById('colorPreview');
        const rgbValues = document.getElementById('rgbValues');
        const downloadBtn = document.getElementById('downloadBtn');

        let originalImage = new Image();
        let originalImageData = null;
        let selectedColor = null;
        
        // Mobile safeguard: scale down images larger than this to prevent iOS Safari crashes
        const MAX_IMAGE_DIMENSION = 1200; 

        // Handle Image Upload
        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage.onload = function() {
                    
                    // Calculate scaling if the image is too large for mobile browsers
                    let width = originalImage.width;
                    let height = originalImage.height;

                    if (width > MAX_IMAGE_DIMENSION || height > MAX_IMAGE_DIMENSION) {
                        const ratio = Math.min(MAX_IMAGE_DIMENSION / width, MAX_IMAGE_DIMENSION / height);
                        width = Math.floor(width * ratio);
                        height = Math.floor(height * ratio);
                    }

                    // Set canvas dimensions to the scaled sizes
                    canvas.width = width;
                    canvas.height = height;
                    
                    // Draw original image (scaled if necessary)
                    ctx.drawImage(originalImage, 0, 0, width, height);
                    
                    // Store original pixel data for processing
                    originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    // Reset selections
                    selectedColor = null;
                    colorPreview.style.backgroundColor = 'transparent';
                    rgbValues.innerText = 'Tap the image!';
                    downloadBtn.disabled = false;
                }
                originalImage.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // Use pointerdown instead of click for reliable touch tracking on iOS/Android
        canvas.addEventListener('pointerdown', function(e) {
            if (!originalImageData) return;

            // Get exact coordinates accounting for CSS scaling on responsive screens
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);

            // Ensure out-of-bounds taps don't crash it
            if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return;

            // Get color at clicked pixel from original data
            const index = (y * canvas.width + x) * 4;
            const r = originalImageData.data[index];
            const g = originalImageData.data[index + 1];
            const b = originalImageData.data[index + 2];

            selectedColor = { r, g, b };
            
            // Update UI
            colorPreview.style.backgroundColor = `rgb(${r},${g},${b})`;
            rgbValues.innerText = `RGB(${r}, ${g}, ${b})`;

            // Process Image
            processImage();
        });

        // Handle Tolerance Slider Change
        toleranceSlider.addEventListener('input', function() {
            toleranceValue.innerText = this.value;
            if (selectedColor) {
                // Request animation frame keeps sliders smoother on mobile
                requestAnimationFrame(processImage); 
            }
        });

        // Process the Image (Isolate Color)
        function processImage() {
            if (!originalImageData || !selectedColor) return;

            const tolerance = parseInt(toleranceSlider.value);
            
            const currentImageData = new ImageData(
                new Uint8ClampedArray(originalImageData.data), 
                originalImageData.width, 
                originalImageData.height
            );
            const data = currentImageData.data;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                const distance = Math.sqrt(
                    Math.pow(r - selectedColor.r, 2) + 
                    Math.pow(g - selectedColor.g, 2) + 
                    Math.pow(b - selectedColor.b, 2)
                );

                if (distance > tolerance) {
                    const gray = (r * 0.299) + (g * 0.587) + (b * 0.114);
                    data[i] = gray;     
                    data[i + 1] = gray; 
                    data[i + 2] = gray; 
                }
            }

            ctx.putImageData(currentImageData, 0, 0);
        }

        // Handle Download
        downloadBtn.addEventListener('click', function() {
            if (!originalImageData) return;
            
            const link = document.createElement('a');
            link.download = 'color-isolated-image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
